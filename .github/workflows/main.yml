version: 2
updates:
  # Keep GitHub Actions versions in the CodeQL workflow up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # If you later add a package.json (npm dependencies), this will scan it too
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
